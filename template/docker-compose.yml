# =============================================================================
# Shared infrastructure services — started independently on the host.
#
# Run: docker compose up -d
# This is completely decoupled from devcontainers.
#
# CUSTOMIZE: Add your own infrastructure services (Postgres, Redis, etc.)
# =============================================================================

services:
  traefik:
    image: traefik:v3
    container_name: "traefik-${PROJECT_NAME:-myapp}"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${NETWORK_NAME:-devnet-myapp}
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "${TRAEFIK_PORT:-80}:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${PROJECT_NAME:-myapp}.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080"
    networks:
      - devnet
    restart: unless-stopped

  # Example infrastructure services.
  # Uncomment and adapt for your project's needs.

