# =============================================================================
# Shared infrastructure services (started only in the main worktree).
#
# DO NOT EDIT the traefik service or the networks section — they are part of
# the devcontainer-wt template engine.
#
# CUSTOMIZE: Add your own infrastructure services (Postgres, Redis, etc.)
# under the "Add infrastructure services below" section.
# Every service MUST have `profiles: [infra]` to ensure it only starts
# from the main worktree.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # DO NOT EDIT — devcontainer-wt core infrastructure
  # ---------------------------------------------------------------------------
  traefik:
    profiles: [infra]
    image: traefik:v3
    container_name: "traefik-${PROJECT_NAME}"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${NETWORK_NAME}
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "${TRAEFIK_PORT}:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${PROJECT_NAME}.localhost`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080"
    networks:
      - devnet
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CUSTOMIZE — Add infrastructure services below.
  # Remember: every service needs `profiles: [infra]`.
  # ---------------------------------------------------------------------------

  # postgres:
  #   profiles: [infra]
  #   image: postgres:16
  #   container_name: "postgres-${PROJECT_NAME}"
  #   environment:
  #     POSTGRES_PASSWORD: dev
  #     POSTGRES_USER: dev
  #   ports:
  #     - "${POSTGRES_HOST_PORT:-15432}:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   networks:
  #     - devnet
  #   restart: unless-stopped

  # redis:
  #   profiles: [infra]
  #   image: redis:7-alpine
  #   container_name: "redis-${PROJECT_NAME}"
  #   networks:
  #     - devnet
  #   restart: unless-stopped

# ---------------------------------------------------------------------------
# CUSTOMIZE — Uncomment and add volumes for infrastructure services.
# ---------------------------------------------------------------------------
# volumes:
#   pgdata:
#     name: "${PROJECT_NAME}-pgdata"

# ---------------------------------------------------------------------------
# DO NOT EDIT — devcontainer-wt networking
# ---------------------------------------------------------------------------
networks:
  devnet:
    name: ${NETWORK_NAME}
